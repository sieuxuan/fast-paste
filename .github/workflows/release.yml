name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run build

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-release | Out-Null
          Copy-Item src-tauri\target\release\fast-paste.exe dist-release\FastPaste-Portable.exe
          Copy-Item src-tauri\target\release\bundle\nsis\*.exe dist-release\
          Copy-Item src-tauri\target\release\bundle\msi\*.msi dist-release\

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist-release/*

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build release APK
        run: gradle -p android assembleRelease

      - name: Collect Android artifact
        run: |
          mkdir -p dist-release
          cp android/app/build/outputs/apk/release/app-release.apk dist-release/FastPaste-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist-release/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
