<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPaste</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --text: #27313f;
      --muted: #697586;
      --faint: #98a2b3;
      --line: #e3e8ef;
      --line-strong: #cdd5df;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --green: #0f766e;
      --green-soft: #e6f6f3;
      --orange: #f97316;
      --orange-soft: #fff4e8;
      --red: #dc2626;
      --red-soft: #fef2f2;
      --radius: 8px;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      background: var(--bg);
    }

    .topbar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 11px;
    }

    .mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .brand-copy {
      min-width: 0;
    }

    .title {
      color: #111827;
      font-size: 15px;
      font-weight: 750;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 390px;
    }

    .top-actions {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .hotkey-pill {
      color: var(--text);
    }

    kbd {
      min-width: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
      border: 1px solid var(--line-strong);
      border-bottom-color: #aeb9c7;
      border-radius: 5px;
      background: #fff;
      color: #111827;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
      box-shadow: inset 0 -1px 0 rgba(15, 23, 42, 0.08);
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 8px 18px 0;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .tab {
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 8px 8px 0 0;
      background: transparent;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .tab:hover {
      background: var(--surface-soft);
      color: var(--text);
    }

    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .content {
      min-height: 0;
      overflow: auto;
      padding: 16px 18px 18px;
    }

    .content::-webkit-scrollbar {
      width: 8px;
    }

    .content::-webkit-scrollbar-thumb {
      border: 2px solid var(--bg);
      border-radius: 999px;
      background: #cbd5e1;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr minmax(180px, 280px);
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .section-title h1 {
      color: #111827;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 800;
    }

    .section-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .search {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .search:focus,
    .text-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .empty {
      min-height: 260px;
      display: grid;
      place-items: center;
      padding: 36px 20px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      text-align: center;
    }

    .empty strong {
      display: block;
      margin-bottom: 5px;
      color: var(--text);
      font-size: 14px;
    }

    .date-group {
      margin-bottom: 16px;
    }

    .date-header {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .history-item:hover {
      border-color: #9bb9ff;
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .history-item:active {
      transform: translateY(0);
    }

    .history-main {
      min-width: 0;
    }

    .history-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 21px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
    }

    .badge.pc {
      background: var(--primary-soft);
      color: #1d4ed8;
    }

    .badge.android {
      background: var(--green-soft);
      color: var(--green);
    }

    .history-text {
      color: #111827;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .copy-hint {
      color: var(--faint);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(240px, 0.9fr);
      gap: 14px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
    }

    .card-title {
      color: #111827;
      font-size: 13px;
      font-weight: 800;
    }

    .card-body {
      padding: 14px;
    }

    .setting-stack {
      display: grid;
      gap: 12px;
    }

    .setting-row {
      display: grid;
      grid-template-columns: 1fr;
      align-items: start;
      gap: 10px;
    }

    .label {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .label strong {
      color: #111827;
      font-size: 13px;
      font-weight: 750;
    }

    .label span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      width: 100%;
    }

    .text-input {
      width: 100%;
      min-width: 0;
      flex: 1;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      outline: none;
      user-select: text;
    }

    .primary-button {
      height: 36px;
      padding: 0 13px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .primary-button:hover {
      background: #1d4ed8;
    }

    .primary-button:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .secondary-button {
      height: 36px;
      padding: 0 13px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .secondary-button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .preview-line {
      min-height: 29px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .save-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .save-status.ok {
      color: var(--green);
      font-weight: 700;
    }

    .save-status.error {
      color: var(--red);
      font-weight: 700;
    }

    .toggle {
      position: relative;
      width: 46px;
      height: 26px;
      display: inline-flex;
      cursor: pointer;
    }

    .toggle input {
      width: 0;
      height: 0;
      opacity: 0;
    }

    .toggle span {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #cdd5df;
      transition: background 0.18s ease;
    }

    .toggle span::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.22);
      transition: transform 0.18s ease;
    }

    .toggle input:checked + span {
      background: var(--green);
    }

    .toggle input:checked + span::after {
      transform: translateX(20px);
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      font-size: 13px;
    }

    .mono {
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      user-select: text;
    }

    .muted {
      color: var(--muted);
    }

    .small-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--orange-soft);
      color: #c2410c;
      font-size: 11px;
      font-weight: 800;
    }

    @media (max-width: 680px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        width: 100%;
        justify-content: space-between;
      }

      .toolbar,
      .settings-grid,
      .setting-row {
        grid-template-columns: 1fr;
      }

      .input-group {
        width: 100%;
      }

      .text-input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">FP</div>
        <div class="brand-copy">
          <div class="title">FastPaste</div>
          <div id="app-subtitle" class="subtitle">Clipboard sync đang chạy nền</div>
        </div>
      </div>

      <div class="top-actions">
        <div id="connection-pill" class="pill"><span class="status-dot"></span><span>Đang chạy</span></div>
        <div id="hotkey-display" class="pill hotkey-pill"></div>
      </div>
    </header>

    <nav class="tabs" aria-label="Điều hướng">
      <button class="tab active" data-tab="history" type="button">Lịch sử</button>
      <button class="tab" data-tab="settings" type="button">Cài đặt</button>
    </nav>

    <main class="content">
      <section id="panel-history" class="panel active">
        <div class="toolbar">
          <div class="section-title">
            <h1>Lịch sử clipboard</h1>
            <span id="history-count">0 mục</span>
          </div>
          <input id="history-search" class="search" type="search" placeholder="Tìm trong lịch sử">
        </div>
        <div id="history-container"></div>
      </section>

      <section id="panel-settings" class="panel">
        <div class="settings-grid">
          <div class="setting-stack">
            <div class="card">
              <div class="card-header">
                <div class="card-title">Hotkey ẩn/hiện</div>
              </div>
              <div class="card-body setting-stack">
                <div class="setting-row">
                  <div class="label">
                    <strong>Tổ hợp phím</strong>
                    <span>Dùng dạng Ctrl+Alt+Z hoặc CommandOrControl+Alt+Z.</span>
                  </div>
                  <div class="input-group">
                    <input id="hotkey-input" class="text-input" type="text" spellcheck="false" value="CommandOrControl+Alt+Z">
                    <button id="save-hotkey" class="primary-button" type="button">Lưu</button>
                  </div>
                </div>
                <div id="hotkey-preview" class="preview-line"></div>
                <div id="hotkey-status" class="save-status"></div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <div class="card-title">Khởi động cùng Windows</div>
                <label class="toggle" title="Tự chạy cùng Windows">
                  <input id="autostart-checkbox" type="checkbox">
                  <span></span>
                </label>
              </div>
              <div class="card-body">
                <div class="label">
                  <strong id="autostart-title">Đang tắt</strong>
                  <span id="autostart-copy">FastPaste chỉ chạy khi bạn mở thủ công.</span>
                </div>
                <div id="autostart-status" class="save-status" style="margin-top: 10px;"></div>
              </div>
            </div>
          </div>

          <div class="setting-stack">
            <div class="card">
              <div class="card-header">
                <div class="card-title">Địa chỉ mạng</div>
              </div>
              <div class="card-body">
                <div id="ips" class="list"></div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <div class="card-title">Phiên bản</div>
              </div>
              <div class="card-body">
                <div class="label">
                  <strong id="version-title">FastPaste 2.1.0</strong>
                  <span id="update-status">Chưa kiểm tra cập nhật.</span>
                </div>
                <div class="button-row">
                  <button id="check-update" class="secondary-button" type="button">Kiểm tra</button>
                  <button id="open-update" class="primary-button" type="button" hidden>Tải bản mới</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const invoke = window.__TAURI__.core.invoke;
    const listen = window.__TAURI__.event.listen;
    const APP_VERSION = '2.1.0';
    const UPDATE_MANIFEST_URL = 'https://raw.githubusercontent.com/sieuxuan/fast-paste/master/update.json';

    const state = {
      data: null,
      activeTab: 'history',
      query: '',
      currentHistory: [],
      updateUrl: 'https://github.com/sieuxuan/fast-paste/releases/latest'
    };

    const els = {
      subtitle: document.getElementById('app-subtitle'),
      connection: document.getElementById('connection-pill'),
      hotkeyDisplay: document.getElementById('hotkey-display'),
      historyCount: document.getElementById('history-count'),
      historySearch: document.getElementById('history-search'),
      historyContainer: document.getElementById('history-container'),
      hotkeyInput: document.getElementById('hotkey-input'),
      hotkeyPreview: document.getElementById('hotkey-preview'),
      hotkeyStatus: document.getElementById('hotkey-status'),
      saveHotkey: document.getElementById('save-hotkey'),
      autostartCheckbox: document.getElementById('autostart-checkbox'),
      autostartTitle: document.getElementById('autostart-title'),
      autostartCopy: document.getElementById('autostart-copy'),
      autostartStatus: document.getElementById('autostart-status'),
      ips: document.getElementById('ips'),
      versionTitle: document.getElementById('version-title'),
      updateStatus: document.getElementById('update-status'),
      checkUpdate: document.getElementById('check-update'),
      openUpdate: document.getElementById('open-update')
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeKeyToken(token) {
      const raw = token.trim();
      const lower = raw.toLowerCase();
      const aliases = {
        commandorcontrol: 'Ctrl',
        cmdorctrl: 'Ctrl',
        command: 'Ctrl',
        control: 'Ctrl',
        ctrl: 'Ctrl',
        option: 'Alt',
        alt: 'Alt',
        shift: 'Shift',
        super: 'Win',
        meta: 'Win',
        win: 'Win',
        windows: 'Win',
        escape: 'Esc',
        esc: 'Esc',
        return: 'Enter',
        enter: 'Enter',
        space: 'Space',
        plus: '+'
      };

      if (aliases[lower]) return aliases[lower];
      if (/^f\d{1,2}$/i.test(raw)) return raw.toUpperCase();
      if (raw.length === 1) return raw.toUpperCase();
      return raw.charAt(0).toUpperCase() + raw.slice(1);
    }

    function displayHotkey(raw) {
      const parts = String(raw || '')
        .split('+')
        .map(normalizeKeyToken)
        .filter(Boolean);

      if (!parts.length) return '<span class="muted">Chưa đặt hotkey</span>';
      return parts.map(part => `<kbd>${escapeHtml(part)}</kbd>`).join(' <span class="muted">+</span> ');
    }

    function hotkeyInputText(raw) {
      const parts = String(raw || '')
        .split('+')
        .map(normalizeKeyToken)
        .filter(Boolean);

      return parts.join('+');
    }

    function toTauriHotkey(raw) {
      return String(raw || '')
        .split('+')
        .map(part => {
          const trimmed = part.trim();
          const lower = trimmed.toLowerCase();
          if (['ctrl', 'control', 'commandorcontrol', 'cmdorctrl'].includes(lower)) return 'CommandOrControl';
          if (lower === 'option') return 'Alt';
          if (lower === 'esc') return 'Escape';
          if (trimmed.length === 1) return trimmed.toUpperCase();
          return trimmed;
        })
        .filter(Boolean)
        .join('+');
    }

    function setStatus(element, message, type = '') {
      element.textContent = message;
      element.className = `save-status ${type}`.trim();
    }

    function compareVersions(left, right) {
      const a = String(left || '').split('.').map(part => Number.parseInt(part, 10) || 0);
      const b = String(right || '').split('.').map(part => Number.parseInt(part, 10) || 0);
      const length = Math.max(a.length, b.length);

      for (let i = 0; i < length; i += 1) {
        if ((a[i] || 0) > (b[i] || 0)) return 1;
        if ((a[i] || 0) < (b[i] || 0)) return -1;
      }

      return 0;
    }

    function switchTab(tabId) {
      state.activeTab = tabId;
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.tab === tabId);
      });
      document.querySelectorAll('.panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === `panel-${tabId}`);
      });
    }

    function formatDate(isoString) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return 'Không rõ ngày';

      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      if (date.toDateString() === today.toDateString()) return 'Hôm nay';
      if (date.toDateString() === yesterday.toDateString()) return 'Hôm qua';
      return date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function formatTime(isoString) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return '--:--';
      return date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    }

    function sourceMeta(source) {
      return source === 'PC'
        ? { className: 'pc', label: 'PC' }
        : { className: 'android', label: 'Android' };
    }

    function renderHistory() {
      const allItems = state.data?.history || [];
      const query = state.query.trim().toLowerCase();
      const filtered = query
        ? allItems.filter(item => String(item.text || '').toLowerCase().includes(query))
        : allItems;

      state.currentHistory = allItems;
      els.historyCount.textContent = `${allItems.length} mục`;

      if (!allItems.length) {
        els.historyContainer.innerHTML = `
          <div class="empty">
            <div>
              <strong>Chưa có dữ liệu clipboard</strong>
              <span>Copy nội dung trên PC hoặc kết nối điện thoại.</span>
            </div>
          </div>`;
        return;
      }

      if (!filtered.length) {
        els.historyContainer.innerHTML = `
          <div class="empty">
            <div>
              <strong>Không tìm thấy kết quả</strong>
              <span>Thử từ khóa ngắn hơn.</span>
            </div>
          </div>`;
        return;
      }

      const groups = new Map();
      filtered.forEach(item => {
        const originalIndex = allItems.indexOf(item);
        const dateLabel = formatDate(item.timestamp);
        if (!groups.has(dateLabel)) groups.set(dateLabel, []);
        groups.get(dateLabel).push({ ...item, originalIndex });
      });

      els.historyContainer.innerHTML = Array.from(groups.entries()).map(([dateLabel, items]) => `
        <div class="date-group">
          <div class="date-header">${escapeHtml(dateLabel)}</div>
          <div class="history-list">
            ${items.map(item => {
              const meta = sourceMeta(item.source);
              const text = String(item.text || '');
              const displayText = text.length > 260 ? `${text.slice(0, 260)}...` : text;
              return `
                <button class="history-item" type="button" data-index="${item.originalIndex}" title="Copy">
                  <span class="history-main">
                    <span class="history-meta">
                      <span class="badge ${meta.className}">${meta.label}</span>
                      <span>${formatTime(item.timestamp)}</span>
                    </span>
                    <span class="history-text">${escapeHtml(displayText)}</span>
                  </span>
                  <span class="copy-hint">Copy</span>
                </button>`;
            }).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderSettings() {
      const settings = state.data?.settings || {};
      const ips = state.data?.ips || [];
      const hotkey = settings.hotkey || 'CommandOrControl+Alt+Z';

      els.versionTitle.textContent = `FastPaste ${APP_VERSION}`;
      if (document.activeElement !== els.hotkeyInput) {
        els.hotkeyInput.value = hotkeyInputText(hotkey);
      }
      els.hotkeyDisplay.innerHTML = displayHotkey(hotkey);
      els.hotkeyPreview.innerHTML = `Hiển thị: ${displayHotkey(els.hotkeyInput.value)}`;

      els.autostartCheckbox.checked = Boolean(settings.auto_start);
      els.autostartTitle.textContent = settings.auto_start ? 'Đang bật' : 'Đang tắt';
      els.autostartCopy.textContent = settings.auto_start
        ? 'Khi đăng nhập Windows, FastPaste chạy ẩn trong tray.'
        : 'FastPaste chỉ chạy khi bạn mở thủ công.';

      els.connection.innerHTML = '<span class="status-dot"></span><span>Đang chạy</span>';
      els.subtitle.textContent = 'Clipboard sync đang chạy nền';

      els.ips.innerHTML = ips.length
        ? ips.map(ip => `
          <div class="list-item">
            <span class="mono">${escapeHtml(ip)}:4567</span>
            <span class="small-pill">LAN</span>
          </div>`).join('')
        : '<div class="list-item muted">Chưa tìm thấy địa chỉ mạng</div>';
    }

    function render() {
      renderSettings();
      renderHistory();
    }

    async function saveHotkey() {
      const canonical = toTauriHotkey(els.hotkeyInput.value);
      if (!canonical) {
        setStatus(els.hotkeyStatus, 'Hotkey không được để trống.', 'error');
        return;
      }

      els.saveHotkey.disabled = true;
      setStatus(els.hotkeyStatus, 'Đang lưu...');

      try {
        await invoke('save_hotkey', { hotkey: canonical });
        els.hotkeyInput.value = hotkeyInputText(canonical);
        els.hotkeyDisplay.innerHTML = displayHotkey(canonical);
        els.hotkeyPreview.innerHTML = `Hiển thị: ${displayHotkey(canonical)}`;
        setStatus(els.hotkeyStatus, 'Đã lưu hotkey.', 'ok');
      } catch (error) {
        setStatus(els.hotkeyStatus, String(error), 'error');
      } finally {
        els.saveHotkey.disabled = false;
      }
    }

    async function saveAutoStart() {
      const nextValue = els.autostartCheckbox.checked;
      els.autostartCheckbox.disabled = true;
      setStatus(els.autostartStatus, 'Đang lưu...');

      try {
        await invoke('save_autostart', { autostart: nextValue });
        setStatus(
          els.autostartStatus,
          nextValue ? 'Đã bật tự khởi động ẩn.' : 'Đã tắt tự khởi động.',
          'ok'
        );
      } catch (error) {
        els.autostartCheckbox.checked = !nextValue;
        setStatus(els.autostartStatus, String(error), 'error');
      } finally {
        els.autostartCheckbox.disabled = false;
      }
    }

    async function checkForUpdates(silent = false) {
      els.checkUpdate.disabled = true;
      if (!silent) {
        els.updateStatus.textContent = 'Đang kiểm tra cập nhật...';
      }

      try {
        const response = await fetch(`${UPDATE_MANIFEST_URL}?t=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const manifest = await response.json();
        const latestVersion = manifest?.desktop?.version || manifest?.version;
        const updateUrl = manifest?.desktop?.downloadUrl || manifest?.releaseUrl || state.updateUrl;

        if (latestVersion && compareVersions(latestVersion, APP_VERSION) > 0) {
          state.updateUrl = updateUrl;
          els.updateStatus.textContent = `Có bản mới ${latestVersion}. Bấm tải để mở GitHub.`;
          els.openUpdate.hidden = false;
        } else {
          state.updateUrl = manifest?.releaseUrl || state.updateUrl;
          els.updateStatus.textContent = 'Đang dùng bản mới nhất.';
          els.openUpdate.hidden = true;
        }
      } catch (error) {
        if (!silent) {
          els.updateStatus.textContent = `Không kiểm tra được cập nhật: ${error.message || error}`;
        }
      } finally {
        els.checkUpdate.disabled = false;
      }
    }

    async function openUpdate() {
      try {
        await invoke('open_update_url', { url: state.updateUrl });
      } catch (error) {
        els.updateStatus.textContent = String(error);
      }
    }

    function bindEvents() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
      });

      els.historySearch.addEventListener('input', event => {
        state.query = event.target.value;
        renderHistory();
      });

      els.historyContainer.addEventListener('click', event => {
        const item = event.target.closest('.history-item');
        if (!item) return;

        const index = Number(item.dataset.index);
        const entry = state.currentHistory[index];
        if (entry) invoke('copy_text', { text: entry.text });
      });

      els.hotkeyInput.addEventListener('input', () => {
        els.hotkeyPreview.innerHTML = `Hiển thị: ${displayHotkey(els.hotkeyInput.value)}`;
        setStatus(els.hotkeyStatus, '');
      });

      els.hotkeyInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') saveHotkey();
      });

      els.saveHotkey.addEventListener('click', saveHotkey);
      els.autostartCheckbox.addEventListener('change', saveAutoStart);
      els.checkUpdate.addEventListener('click', () => checkForUpdates(false));
      els.openUpdate.addEventListener('click', openUpdate);
    }

    bindEvents();
    listen('update_state', event => {
      state.data = event.payload;
      render();
    });
    invoke('request_state');
    checkForUpdates(true);
  </script>
</body>
</html>
